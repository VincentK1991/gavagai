version: "0.2.0.dev0"
semantic_model:
  - name: org_hierarchy
    description: >
      Organisational hierarchy model used by the §2.2 self-join tests. The
      self-join is modelled with a ROLE DATASET (LookML's `from:` pattern):
      `managers` is a second logical dataset over the same physical source as
      `employees`, and the employee→manager relationship relates the two
      names. The compiler then produces an ordinary join with distinct
      aliases:

        FROM hr.employees AS "employees"
        LEFT JOIN hr.employees AS "managers"
          ON "employees"."manager_id" = "managers"."employee_id"

      A relationship whose from == to is rejected by model validation, with a
      pointer to this pattern.

    datasets:

      - name: employees
        source: hr.employees
        primary_key: [employee_id]
        description: One row per employee (the report role).
        fields:
          - name: employee_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: employee_id

          - name: manager_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: manager_id

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            dimension:
              is_time: false

          - name: department
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: department
            dimension:
              is_time: false

          - name: salary
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: salary

      # Role dataset: the SAME physical table as employees under a second
      # logical name, playing the "manager" role in the relationship below.
      - name: managers
        source: hr.employees
        primary_key: [employee_id]
        description: One row per employee, in the manager role.
        fields:
          - name: employee_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: employee_id

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            dimension:
              is_time: false

          - name: department
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: department
            dimension:
              is_time: false

          - name: salary
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: salary

    relationships:
      # employees (many) -> managers (one): each employee has one manager.
      - name: employee_to_manager
        from: employees
        to: managers
        from_columns: [manager_id]
        to_columns: [employee_id]

    metrics:
      - name: headcount
        description: Total number of employees (COUNT(*) — fan-out safe per group).
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)

      - name: total_salary
        description: >
          Sum of salaries. Referenced at the managers grain (the "one" side)
          alongside an employees dimension, this fans out — each manager row
          is duplicated per report — and the planner refuses it. Used only by
          the fan-out test, which errors before any SQL is emitted.
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(salary)
