version: "0.2.0.dev0"
semantic_model:
  - name: web_analytics
    description: >
      Web analytics model used by §10 window-function tests (all PENDING).
      Window functions are not yet expressible in the query IR. When they are,
      ROW_NUMBER, RANK, running SUM, and moving AVG should be derivable from
      the events dataset.

    datasets:

      - name: events
        source: analytics.events
        primary_key: [event_id]
        description: One row per tracked page event.
        fields:
          - name: event_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: event_id

          - name: session_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: session_id
            dimension:
              is_time: false

          - name: user_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: user_id
            dimension:
              is_time: false

          - name: page_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: page_name
            dimension:
              is_time: false

          - name: ts
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ts
            dimension:
              is_time: true

    relationships: []

    metrics:
      - name: event_count
        description: Total number of events.
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)

      - name: unique_users
        description: Distinct user count (fan-out safe).
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT events.user_id)
